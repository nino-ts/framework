name: Publish package on registry

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.4.0)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node (for npm OIDC)
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"
          scope: "@ninots"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ninots/framework@${VERSION}" version >/dev/null 2>&1; then
            echo "npm @ninots/framework@${VERSION} already published — skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish to JSR
        run: bunx --bun jsr publish --allow-slow-types
