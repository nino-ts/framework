name: Publish package on registry

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.11.0)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC) when NPM_TOKEN is unset.
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      # CI-only: enables npm Trusted Publishing / OIDC when NPM_TOKEN is absent.
      # Product support matrix remains Bun-only; this does not reintroduce Node as a runtime.
      - name: Set up Node (npm OIDC helper)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          scope: "@ninots"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      # Prefer bun publish + NPM_CONFIG_TOKEN when secrets.NPM_TOKEN is set.
      # Else fall back to npm publish --provenance (Trusted Publishing / OIDC), which is how
      # @ninots/framework@0.10.x published without a classic automation token.
      - name: Publish to npm
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -n "${NPM_CONFIG_TOKEN}" ]; then
            printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_CONFIG_TOKEN}" >> "${HOME}/.npmrc"
            echo "Publishing @ninots/framework@${VERSION} via bun publish"
            bun publish --access public --tolerate-republish
          else
            echo "NPM_TOKEN unset — using npm Trusted Publishing (OIDC) for @ninots/framework@${VERSION}"
            if npm view "@ninots/framework@${VERSION}" version >/dev/null 2>&1; then
              echo "npm @ninots/framework@${VERSION} already published — skipping"
            else
              npm publish --access public --provenance
            fi
          fi

      - name: Publish to JSR
        run: bunx --bun jsr publish --allow-slow-types --allow-dirty
