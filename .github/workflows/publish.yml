name: Publish package on registry

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.11.0)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Kept for npm Trusted Publishing / OIDC when configured on the package;
      # Bun publish authenticates primarily via NPM_CONFIG_TOKEN (CI secret).
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      # Publishes to the npmjs.org registry host via Bun (not the npm CLI / Node).
      # Auth: NPM_CONFIG_TOKEN from repo secrets. Avoid GAT bypass2fa tokens.
      # --tolerate-republish exits 0 if the version already exists (idempotent CI).
      - name: Publish to npm (via bun publish)
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public --tolerate-republish

      - name: Publish to JSR
        run: bunx --bun jsr publish --allow-slow-types --allow-dirty
