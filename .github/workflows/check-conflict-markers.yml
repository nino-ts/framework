name: Check for git conflict markers

on:
  push:
  pull_request:

jobs:
  check_markers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find merge conflict markers
        run: |
          set -e
          matches=$(grep -R -n -E "^(<{7,}|={7,}|>{7,})" --exclude-dir=.git || true)
          if [ -n "$matches" ]; then
            echo "Conflict markers found:";
            echo "$matches";
            exit 1;
          fi
          echo "No conflict markers found.";
